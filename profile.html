<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>My Profile | STNET ID</title>
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>

    <style>
        /* CRITICAL: Prevent flash of wrong background */
        :root { --bg: #ffffff; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; } }
        html, body { background-color: var(--bg) !important; margin: 0; padding: 0; }
    </style>

    <style>
        :root {
            --bg: #ffffff;
            --container-bg: #f9f9fb;
            --border-color: rgba(0, 0, 0, 0.1);
            --text-main: #111;
            --text-muted: #666;
            --red: #f70000;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --container-bg: #111111;
                --border-color: rgba(255, 255, 255, 0.15);
                --text-main: #eee;
                --text-muted: #aaa;
            }
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .profile-container {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border-color);
            margin-bottom: 20px;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 5px 0;
        }

        .profile-email {
            color: var(--text-muted);
            font-size: 1rem;
            margin: 0 0 30px 0;
        }

        .action-list {
            text-align: left;
            margin-top: 30px;
        }

        .action-item {
            background: var(--bg);
            border: 1px solid var(--border-color);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .action-item-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-item-info h4 {
            margin: 0 0 5px 0;
            font-size: 1rem;
        }

        .action-item-info p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .btn-action {
            background: var(--red);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        .btn-action:hover {
            background: #cc0000;
        }

        .btn-action:disabled {
            background: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: left;
            width: 100%;
        }

        .btn-back:hover {
            color: var(--text-main);
        }
    </style>
</head>

<body>

    <div class="profile-container" id="profile-content" style="display: none;">
        <a href="/" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Back to Portal</a>

        <img id="user-picture" src="" alt="Profile Picture" class="profile-img">
        <h2 id="user-name" class="profile-name">Loading...</h2>
        <p id="user-email" class="profile-email">loading@stnetradio.com</p>

        <div class="action-list">

            <div class="action-item">
                <h4 style="margin-top: 0; margin-bottom: 15px;"><i class="fa-solid fa-user-pen"></i> Edit Profile</h4>

                <label style="font-size: 0.85rem; color: var(--text-muted);">Display Name</label>
                <input type="text" id="edit-name"
                    style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg); color: var(--text-main); box-sizing: border-box;">

                <label style="font-size: 0.85rem; color: var(--text-muted);">Profile Picture (Image URL)</label>
                <input type="url" id="edit-picture" placeholder="https://..."
                    style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg); color: var(--text-main); box-sizing: border-box;">

                <button class="btn-action" id="btn-save-profile" style="width: 100%;" onclick="saveProfile()">Save
                    Changes</button>
                <div id="save-msg"
                    style="font-size: 0.85rem; margin-top: 10px; text-align: center; color: var(--text-muted);"></div>
            </div>

            <div class="action-item action-item-flex">
                <div class="action-item-info">
                    <h4><i class="fa-solid fa-fingerprint"></i> Passkeys & MFA</h4>
                    <p>Clear devices. You will be prompted to set up a new Passkey on your next login.</p>
                </div>
                <button class="btn-action" id="btn-reset-passkey"
                    style="background: var(--text-main); color: var(--bg);" onclick="resetPasskeys()">Clear</button>
            </div>

            <div class="action-item action-item-flex">
                <div class="action-item-info">
                    <h4><i class="fa-solid fa-key"></i> Password</h4>
                    <p>Send a secure link to reset your password.</p>
                </div>
                <button class="btn-action" id="btn-reset-password" onclick="sendPasswordReset()">Reset</button>
            </div>

        </div>
    </div>

    <script>
        // ⭐ นำ Web App URL ของ GAS มาใส่ตรงนี้ (อันเดียวกับที่ใช้ส่ง Email) ⭐
        const GAS_PROFILE_API = "https://script.google.com/macros/s/AKfycbyHJObG6JjRlRgA9ILS2yvQX8vLeTWgdpm1UGR57vhMQhjCfeDndeywFoZKe8Ls5DQ_/exec";

        const AUTH0_DOMAIN = "auth.stnetradio.com";
        const AUTH0_CLIENT_ID = "U4t6BLF2INrgwJbNTRXMpYitLD1SjTCW";
        let auth0Client = null;
        let currentUser = null;

        window.onload = async () => {
            auth0Client = await auth0.createAuth0Client({
                domain: AUTH0_DOMAIN,
                clientId: AUTH0_CLIENT_ID,
                authorizationParams: { redirect_uri: window.location.origin },
                cacheLocation: 'localstorage'
            });

            const isAuthenticated = await auth0Client.isAuthenticated();

            if (isAuthenticated) {
                currentUser = await auth0Client.getUser();

                document.getElementById("user-name").innerText = currentUser.name || "STNET Staff";
                document.getElementById("user-email").innerText = currentUser.email;
                document.getElementById("user-picture").src = currentUser.picture || "https://cdn.auth0.com/avatars/st.png";

                document.getElementById("edit-name").value = currentUser.name || "";
                document.getElementById("edit-picture").value = currentUser.picture || "";

                document.getElementById("profile-content").style.display = "block";
            } else {
                window.location.href = "/";
            }
        };

        // ฟังก์ชัน 1: บันทึกโปรไฟล์
        async function saveProfile() {
            const btn = document.getElementById("btn-save-profile");
            const msg = document.getElementById("save-msg");
            const newName = document.getElementById("edit-name").value;
            const newPicture = document.getElementById("edit-picture").value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
            msg.innerText = "";

            try {
                const response = await fetch(GAS_PROFILE_API, {
                    method: 'POST',
                    body: JSON.stringify({
                        userId: currentUser.sub,
                        name: newName,
                        pictureUrl: newPicture
                    })
                });

                const result = await response.json();
                if (result.status === "success") {
                    msg.style.color = "var(--success, #10b981)";
                    msg.innerText = "Profile updated successfully! (Changes will apply on next login)";
                    document.getElementById("user-name").innerText = newName;

                    if (newPicture) {
                        document.getElementById("user-picture").src = newPicture;
                    }
                } else {
                    msg.style.color = "var(--red)";
                    msg.innerText = "Error: " + result.message;
                }
            } catch (error) {
                msg.style.color = "var(--red)";
                msg.innerText = "Network Error. Please try again.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Save Changes";
            }
        }

        // ฟังก์ชัน 2: ลบ Passkeys ทั้งหมด
        async function resetPasskeys() {
            if (!confirm("Are you sure you want to delete all your saved Passkeys?\nYou will need to set them up again on your next login.")) return;

            const btn = document.getElementById("btn-reset-passkey");
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            try {
                const response = await fetch(GAS_PROFILE_API, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "clear_passkeys",
                        userId: currentUser.sub
                    })
                });

                const result = await response.json();
                if (result.status === "success") {
                    if (result.deletedCount > 0) {
                        alert("✅ Passkeys cleared successfully!\n[System Info] " + result.message);
                    } else {
                        alert("ℹ️ No Passkeys found for this account.\n[System Info] " + result.message);
                    }
                } else {
                    alert("⚠️ Error: " + result.message);
                }
            } catch (error) {
                alert("⚠️ An error occurred. Please try again.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Clear";
            }
        }

        // ฟังก์ชัน 3: ส่งลิงก์เปลี่ยนรหัสผ่าน
        async function sendPasswordReset() {
            if (!currentUser || !currentUser.email) return;
            const btn = document.getElementById("btn-reset-password");
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            try {
                const response = await fetch(`https://${AUTH0_DOMAIN}/dbconnections/change_password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        client_id: AUTH0_CLIENT_ID,
                        email: currentUser.email,
                        connection: 'Username-Password-Authentication'
                    })
                });

                if (response.ok) {
                    alert("✅ We've just sent an email to " + currentUser.email + " to reset your password.");
                } else {
                    alert("⚠️ Failed to send reset email.");
                }
            } catch (error) {
                alert("⚠️ An error occurred.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Reset";
            }
        }
    </script>
</body>

</html>
