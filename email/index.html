<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STNET Radio - Email Dispatch System</title>
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
    <style>
        @font-face {
            font-family: 'Chillax-Variable';
            src: url('/fonts/Chillax-Variable.woff2') format('woff2'),
                url('/fonts/Chillax-Variable.woff') format('woff'),
                url('/fonts/Chillax-Variable.ttf') format('truetype');
        }

        :root {
            --bg: #ffffff;
            --container-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.9);
            --text-main: #111;
            --text-muted: #666;
            --primary: #f70000;
            --primary-hover: #cc0000;
            --success: #10b981;
            --danger: #d93025;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --container-bg: rgba(20, 20, 20, 0.7);
                --border-color: rgba(255, 255, 255, 0.15);
                --input-bg: rgba(255, 255, 255, 0.05);
                --text-main: #eee;
                --text-muted: #aaa;
                --primary: #ff3333;
                --primary-hover: #ff6666;
            }
        }

        html,
        body {
            background-color: var(--bg) !important;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100dvh !important;
            color: var(--text-main);
            font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .hero-glow,
        .hero-glow-2 {
            position: fixed;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        .hero-glow {
            top: -10%;
            left: -10%;
            background: radial-gradient(circle, rgba(247, 0, 0, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
        }

        .hero-glow-2 {
            bottom: -10%;
            right: -10%;
            background: radial-gradient(circle, rgba(247, 0, 0, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
        }

        @media (prefers-color-scheme: dark) {

            .hero-glow,
            .hero-glow-2 {
                background: radial-gradient(circle, rgba(255, 51, 51, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .btn-logout {
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-logout:hover {
            background: rgba(247, 0, 0, 0.1);
            color: var(--primary);
            border-color: rgba(247, 0, 0, 0.2);
        }

        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            padding: 80px 20px 40px;
        }

        .container {
            background: var(--container-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 650px;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            font-family: 'Chillax-Variable', 'IBM Plex Sans Thai', sans-serif;
            background: var(--text-main);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--input-bg);
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .template-section {
            background-color: rgba(247, 0, 0, 0.03);
            padding: 24px 20px;
            border-radius: 16px;
            border: 1px dashed rgba(247, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        /* Custom Select Styles */
        .custom-select {
            position: relative;
            margin-bottom: 24px;
        }

        .select-selected {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--input-bg);
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
        }

        .select-items {
            position: absolute;
            background-color: var(--container-bg);
            backdrop-filter: blur(20px);
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            z-index: 99;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            max-height: 250px;
            overflow-y: auto;
        }

        .select-hide {
            display: none;
        }

        .select-items div {
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }

        .select-items div:hover {
            background-color: rgba(247, 0, 0, 0.05);
            color: var(--primary);
        }

        #generalEmailFields {
            display: none;
            background-color: var(--input-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .status-message {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        #app-view,
        #loading-view {
            display: none;
        }

        .active-view {
            display: block !important;
        }

        .user-info {
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: var(--text-muted);
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
        }

        /* Profile Dropdown Styles */
        .user-profile-dropdown {
            position: relative;
        }

        .profile-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color, rgba(0, 0, 0, 0.1));
            color: var(--text-main, #111);
            padding: 6px 16px 6px 6px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        @media (prefers-color-scheme: dark) {
            .profile-btn {
                background: rgba(0, 0, 0, 0.2);
                border-color: rgba(255, 255, 255, 0.15);
                color: #eee;
            }
        }

        .profile-btn:hover {
            background: rgba(247, 0, 0, 0.05);
            border-color: rgba(247, 0, 0, 0.2);
            transform: translateY(-1px);
        }

        .profile-btn img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-menu {
            position: absolute;
            top: calc(100% + 15px);
            right: 0;
            background: var(--bg);
            border: 1px solid var(--border-color, rgba(0, 0, 0, 0.1));
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 220px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            .profile-menu {
                border-color: rgba(255, 255, 255, 0.15);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            }
        }

        .profile-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .profile-header {
            padding: 16px;
            background: rgba(0, 0, 0, 0.02);
            border-bottom: 1px solid var(--border-color, rgba(0, 0, 0, 0.05));
            text-align: left;
        }

        @media (prefers-color-scheme: dark) {
            .profile-header {
                background: rgba(255, 255, 255, 0.02);
                border-bottom-color: rgba(255, 255, 255, 0.05);
            }
        }

        .profile-name {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main, #111);
            margin-bottom: 4px;
        }

        @media (prefers-color-scheme: dark) {
            .profile-name {
                color: #eee;
            }
        }

        .profile-email {
            display: block;
            font-size: 0.8rem;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (prefers-color-scheme: dark) {
            .profile-email {
                color: #aaa;
            }
        }

        .profile-menu-item {
            padding: 14px 16px;
            color: var(--text-main, #111);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
        }

        @media (prefers-color-scheme: dark) {
            .profile-menu-item {
                color: #eee;
            }
        }

        .profile-menu-item:hover {
            background: rgba(0, 0, 0, 0.03);
        }

        @media (prefers-color-scheme: dark) {
            .profile-menu-item:hover {
                background: rgba(255, 255, 255, 0.05);
            }
        }

        .profile-menu-item i {
            width: 16px;
            text-align: center;
            opacity: 0.8;
        }

        .profile-menu-item.logout-red {
            color: var(--primary, #f70000);
            border-top: 1px solid var(--border-color, rgba(0, 0, 0, 0.05));
        }

        @media (prefers-color-scheme: dark) {
            .profile-menu-item.logout-red {
                border-top-color: rgba(255, 255, 255, 0.05);
            }
        }

        .profile-menu-item.logout-red:hover {
            background: rgba(247, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <div class="top-bar" id="logout-container" style="display: none;">
        <div class="user-profile-dropdown" id="user-profile-dropdown">
            <button class="profile-btn" onclick="toggleProfileMenu(event)">
                <img id="nav-user-picture" src="https://cdn.auth0.com/avatars/st.png" alt="Profile">
                <span id="nav-user-name-text">Team</span>
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="profile-menu" id="profile-menu">
                <div class="profile-header">
                    <span class="profile-name" id="menu-user-name">Team</span>
                    <span class="profile-email" id="menu-user-email">...</span>
                </div>
                <a href="/profile.html" class="profile-menu-item"><i class="fa-regular fa-id-badge"></i> My Profile</a>
                <a href="#" onclick="logout()" class="profile-menu-item logout-red"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
            </div>
        </div>
    </div>

    <div class="hero-glow" aria-hidden="true"></div>
    <div class="hero-glow-2" aria-hidden="true"></div>

    <div class="page-wrapper">
        <div class="container fade-in-up">
            <div class="header">
                <h1>STNET Radio</h1>
                <p>Email Dispatch System</p>
            </div>

            <div id="loading-view" class="active-view" style="text-align: center; color: var(--text-muted);">
                <i class="fa-solid fa-spinner fa-spin"></i> Authenticating...
            </div>

            <div id="app-view">
                <div class="user-info">
                    Current User: <strong id="user-profile-name" style="color: var(--text-main);"></strong><br>
                    <span id="user-profile-email"></span>
                </div>

                <form id="emailForm">
                    <div class="template-section">
                        <label>Select Template</label>
                        <div class="custom-select" id="customTemplateSelect">
                            <div class="select-selected placeholder-active">
                                <span id="selectedTemplateText">-- Please select a template --</span>
                                <i class="fa-solid fa-chevron-down chevron"></i>
                            </div>
                            <div class="select-items select-hide" id="templateOptionsList">
                                <div data-value="https://stnetradio.com/email/shortlisted.html"
                                    data-subject="Initial Screening Passed - STNET Radio" data-type="standard">
                                    Shortlisted</div>
                                <div data-value="https://stnetradio.com/email/rejected.html"
                                    data-subject="Application Update - STNET Radio" data-type="standard">Rejected</div>
                                <div data-value="https://stnetradio.com/email/welcome.html"
                                    data-subject="Welcome to STNET Radio!" data-type="standard">Welcome</div>
                                <div data-value="https://stnetradio.com/email/general.html"
                                    data-subject="Notification from STNET Radio" data-type="general">General Email
                                    (อีเมลทั่วไป)</div>
                            </div>
                        </div>
                        <input type="hidden" id="templateSelect">

                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Email Subject <span
                                    style="font-weight: normal; color: var(--text-muted); font-size: 12px;">(หัวข้ออีเมล)</span></label>
                            <input type="text" id="emailSubject" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Recipient Name <span
                                style="font-weight: normal; color: var(--text-muted); font-size: 12px;">(ชื่อผู้รับ)</span></label>
                        <input type="text" id="applicantName" required>
                    </div>
                    <div class="form-group">
                        <label>Recipient Email <span
                                style="font-weight: normal; color: var(--text-muted); font-size: 12px;">(อีเมลผู้รับ)</span></label>
                        <input type="email" id="targetEmail" required>
                    </div>

                    <div id="generalEmailFields">
                        <div class="section-title">English Content</div>
                        <div class="form-group"><label>Paragraph 1 (EN)</label><textarea id="p1_en"></textarea></div>
                        <div class="form-group"><label>Highlight Text Box (EN)</label><textarea id="hl_en"></textarea>
                        </div>
                        <div class="form-group"><label>Paragraph 2 (EN)</label><textarea id="p2_en"></textarea></div>
                        <div class="section-title">Thai Content</div>
                        <div class="form-group"><label>Paragraph 1 (TH)</label><textarea id="p1_th"></textarea></div>
                        <div class="form-group"><label>Highlight Text Box (TH)</label><textarea id="hl_th"></textarea>
                        </div>
                        <div class="form-group"><label>Paragraph 2 (TH)</label><textarea id="p2_th"></textarea></div>
                        <div class="section-title">Sender Signature</div>
                        <div class="grid-2">
                            <div class="form-group"><label>Department (EN)</label><input type="text" id="department_en">
                            </div>
                            <div class="form-group"><label>Department (TH)</label><input type="text" id="department_th">
                            </div>
                        </div>
                        <div class="form-group"><label>Sender Name (TH)</label><input type="text" id="senderName_th">
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group"><label>Sender Display Name</label><input type="text" id="senderName"
                                value="STNET Radio HR" required></div>
                        <div class="form-group"><label>Sender Email</label><input type="email" id="senderEmail"
                                value="hr@stnetradio.com" required></div>
                    </div>

                    <div class="form-group" id="linkFieldContainer">
                        <label>Action Link <span
                                style="font-weight: normal; color: var(--text-muted); font-size: 12px;">(Booking URL /
                                Staff Portal URL)</span></label>
                        <input type="url" id="actionLink">
                    </div>

                    <button type="submit" class="btn" id="submitBtn"><i class="fa-regular fa-paper-plane"></i> Send
                        Email</button>
                    <div id="statusMessage" class="status-message"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyHJObG6JjRlRgA9ILS2yvQX8vLeTWgdpm1UGR57vhMQhjCfeDndeywFoZKe8Ls5DQ_/exec";
        const AUTH0_DOMAIN = "auth.stnetradio.com";
        const AUTH0_CLIENT_ID = "U4t6BLF2INrgwJbNTRXMpYitLD1SjTCW";
        let auth0Client = null;

        // Auth0 Single Sign-On Logic
        window.onload = async () => {
            auth0Client = await auth0.createAuth0Client({
                domain: AUTH0_DOMAIN,
                clientId: AUTH0_CLIENT_ID,
                authorizationParams: { redirect_uri: window.location.href },
                cacheLocation: 'localstorage' // สำคัญเพื่อให้จำ Session ข้าม Tab
            });

            // 1. Handle Callback from Auth0 Login
            if (location.search.includes("state=") && (location.search.includes("code=") || location.search.includes("error="))) {
                await auth0Client.handleRedirectCallback();
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // 2. Check current status
            const isAuthenticated = await auth0Client.isAuthenticated();

            if (isAuthenticated) {
                showApp();
            } else {
                // 3. ✨ Try Silent Login (SSO) or Force Login
                try {
                    await auth0Client.getTokenSilently();
                    showApp();
                } catch (e) {
                    // Not logged in anywhere, redirect to Auth0
                    auth0Client.loginWithRedirect();
                }
            }
        };

        async function showApp() {
            document.getElementById("loading-view").classList.remove("active-view");
            document.getElementById("logout-container").style.display = "block";
            document.getElementById("app-view").classList.add("active-view");
            const user = await auth0Client.getUser();
            document.getElementById("user-profile-name").innerText = user.name;
            document.getElementById("user-profile-email").innerText = user.email;

            document.getElementById("nav-user-name-text").innerText = user.name || "Staff";
            document.getElementById("menu-user-name").innerText = user.name || "Staff";
            document.getElementById("menu-user-email").innerText = user.email || "";

            if (user.picture) {
                document.getElementById("nav-user-picture").src = user.picture;
            }
        }

        function logout() {
            auth0Client.logout({ logoutParams: { returnTo: window.location.origin } });
        }

        function toggleProfileMenu(e) {
            e.stopPropagation();
            const menu = document.getElementById("profile-menu");
            menu.classList.toggle("active");
        }

        // Close menu when clicking outside
        document.addEventListener('click', function (e) {
            const dropdown = document.getElementById("user-profile-dropdown");
            const menu = document.getElementById("profile-menu");
            if (dropdown && !dropdown.contains(e.target)) {
                menu.classList.remove("active");
            }
        });

        // Dropdown Logic
        const customTemplateSelect = document.getElementById('customTemplateSelect');
        const selectedTemplateText = document.getElementById('selectedTemplateText');
        const templateOptionsList = document.getElementById('templateOptionsList');
        const templateInput = document.getElementById('templateSelect');

        customTemplateSelect.onclick = () => templateOptionsList.classList.toggle('select-hide');

        templateOptionsList.querySelectorAll('div').forEach(option => {
            option.onclick = (e) => {
                e.stopPropagation();
                selectedTemplateText.textContent = option.textContent;
                templateInput.value = option.getAttribute('data-value');
                templateOptionsList.classList.add('select-hide');

                document.getElementById('emailSubject').value = option.getAttribute('data-subject');
                const isGeneral = option.getAttribute('data-type') === 'general';
                document.getElementById('generalEmailFields').style.display = isGeneral ? 'block' : 'none';
                document.getElementById('linkFieldContainer').style.display = isGeneral ? 'none' : 'block';
            };
        });

        // Form Submit Logic
        document.getElementById('emailForm').onsubmit = async (e) => {
            e.preventDefault();
            const statusDiv = document.getElementById('statusMessage');
            const selectedTemplate = templateInput.value;

            if (!selectedTemplate) {
                alert("Please select a template first.");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
            statusDiv.style.display = 'block';
            statusDiv.style.color = 'var(--text-main)';
            statusDiv.innerHTML = 'Processing...';

            const payload = {
                templateUrl: selectedTemplate,
                emailSubject: document.getElementById('emailSubject').value,
                applicantName: document.getElementById('applicantName').value,
                email: document.getElementById('targetEmail').value,
                fromName: document.getElementById('senderName').value,
                fromEmail: document.getElementById('senderEmail').value,
                actionLink: document.getElementById('actionLink').value,
                p1_en: document.getElementById('p1_en').value,
                hl_en: document.getElementById('hl_en').value,
                p2_en: document.getElementById('p2_en').value,
                p1_th: document.getElementById('p1_th').value,
                hl_th: document.getElementById('hl_th').value,
                p2_th: document.getElementById('p2_th').value,
                department_en: document.getElementById('department_en').value,
                senderName_th: document.getElementById('senderName_th').value,
                department_th: document.getElementById('department_th').value
            };

            try {
                const response = await fetch(GAS_API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.status === "success") {
                    statusDiv.innerHTML = 'Sent Successfully!';
                    statusDiv.style.color = 'var(--success)';
                    document.getElementById('emailForm').reset();
                    selectedTemplateText.textContent = "-- Please select a template --";
                } else {
                    statusDiv.innerHTML = 'Error: ' + result.message;
                    statusDiv.style.color = 'var(--danger)';
                }
            } catch (err) {
                statusDiv.innerHTML = 'Network Error';
                statusDiv.style.color = 'var(--danger)';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-regular fa-paper-plane"></i> Send Email';
            }
        };
    </script>
</body>

</html>
